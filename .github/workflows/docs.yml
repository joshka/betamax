name: Docs

# The docs site is a pnpm/Starlight project, but the workflow still installs mise first so CI uses
# the same Node and pnpm versions as local `mise run docs-site-*` commands.
on:
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "site/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "site/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Check docs
        run: mise run docs-site-check

      - name: Build docs
        run: mise run docs-site-build

      - name: Upload Pages artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    name: Deploy docs
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      # GitHub Pages custom workflows require OIDC in addition to pages:write.
      # https://docs.github.com/en/pages/getting-started-with-github-pages/using-custom-workflows-with-github-pages
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
