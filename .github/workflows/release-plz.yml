name: Release-plz

# release-plz owns crate publishing, changelogs, tags, and GitHub Release creation. Binary asset
# jobs stay in this workflow because releases made with the default GITHUB_TOKEN do not trigger
# follow-up workflows:
# https://release-plz.dev/docs/github/token#how-to-trigger-further-workflow-runs
permissions: {}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-plz-release:
    name: Release-plz release
    environment: release
    runs-on: ubuntu-latest
    # This job publishes crates and therefore enters the protected `release` environment. Keep it
    # off ordinary `main` pushes so non-release merges do not require release approval.
    #
    # release-plz release PRs are merged with squash commits whose subjects are `chore: release` or
    # the older `chore(<package>): release ...` form. Manual dispatch remains available for repair.
    if: >-
      ${{
        github.repository_owner == 'joshka' &&
        (
          github.event_name == 'workflow_dispatch' ||
          startsWith(github.event.head_commit.message, 'chore: release') ||
          contains(github.event.head_commit.message, '): release')
        )
      }}
    permissions:
      contents: write
      pull-requests: read
      # crates.io Trusted Publishing uses GitHub OIDC, not CARGO_REGISTRY_TOKEN.
      id-token: write
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - &install-mise
        name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    # These release-plz outputs drive the same-run asset upload fan-out:
    # https://release-plz.dev/docs/github/output
    outputs:
      releases: ${{ steps.release-plz.outputs.releases }}
      releases_created: ${{ steps.release-plz.outputs.releases_created }}

  prepare-release-assets:
    name: Prepare release assets
    runs-on: ubuntu-latest
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.releases_created == 'true' }}
    # The workspace can release betamax-core without a matching CLI release. Only the CLI package
    # receives cargo-binstall archives, so extract its tag and version before building assets.
    outputs:
      betamax_released: ${{ steps.release.outputs.betamax_released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Read Betamax release
        id: release
        env:
          RELEASES: ${{ needs.release-plz-release.outputs.releases }}
        run: |
          set -euo pipefail
          version="$(jq -r '.[] | select(.package_name == "betamax") | .version' <<<"$RELEASES" | head -n1)"
          tag="$(jq -r '.[] | select(.package_name == "betamax") | .tag' <<<"$RELEASES" | head -n1)"
          if [[ -z "$version" || -z "$tag" ]]; then
            echo "betamax_released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "betamax_released=true"
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

  release-assets:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: prepare-release-assets
    if: ${{ needs.prepare-release-assets.outputs.betamax_released == 'true' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Build from the tag cargo-binstall downloads from, not from the workflow SHA.
          ref: ${{ needs.prepare-release-assets.outputs.tag }}
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
      - name: Build CLI
        env:
          TARGET: ${{ matrix.target }}
        run: mise run build-release -- "$TARGET"
      - name: Package archive
        id: package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.prepare-release-assets.outputs.version }}
        run: |
          set -euo pipefail
          archive="$(scripts/package-binstall-archive.sh "$TARGET" "$VERSION" target/dist)"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - name: Upload archive
        env:
          # This token only mutates the release created earlier in the same workflow run.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release-assets.outputs.tag }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
        run: gh release upload "$RELEASE_TAG" "$ARCHIVE" --clobber

  bump-homebrew-tap:
    name: Bump Homebrew tap
    runs-on: ubuntu-latest
    needs:
      - prepare-release-assets
      - release-assets
    if: ${{ needs.prepare-release-assets.outputs.betamax_released == 'true' }}
    permissions: {}
    steps:
      - name: Dispatch tap bump
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.prepare-release-assets.outputs.version }}
          TAG: ${{ needs.prepare-release-assets.outputs.tag }}
        run: |
          set -euo pipefail
          gh workflow run bump-package.yml \
            --repo joshka/homebrew-tap \
            --field package=betamax \
            --field version="$VERSION" \
            --field tag="$TAG"

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    # release-plz's quickstart runs `release` and `release-pr` as sibling jobs on every `main` push.
    # In this repo the release job publishes via a protected environment and then uploads binary
    # assets in the same workflow run. If `release-pr` also runs on a release-PR merge, it can read
    # crates.io before the sibling publish finishes and open a stale PR for the versions being
    # released. Skip release commits here; the next ordinary merge will refresh the release PR.
    if: >-
      ${{
        github.repository_owner == 'joshka' &&
        github.event_name == 'push' &&
        !startsWith(github.event.head_commit.message, 'chore: release') &&
        !contains(github.event.head_commit.message, '): release')
      }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - *install-mise
      - name: Run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
