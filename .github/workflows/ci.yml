name: CI

# CI calls mise tasks instead of spelling out long command lines in YAML. That keeps local and CI
# behavior aligned, and it ensures Cargo sees the Zig 0.15.2 version required by
# libghostty-vt-sys.
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  lint:
    name: Lint, docs, and validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Install beta clippy
        run: rustup toolchain install beta --component clippy

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: mise run fmt-check

      - name: Check clippy
        run: mise run clippy

      - name: Check beta clippy
        run: mise run clippy-beta

      - name: Check documentation builds
        run: mise run doc

      - name: Run doc tests
        run: mise run doc-test

      - name: Lint Markdown
        run: mise run lint-md

      - name: Validate tapes
        run: mise run validate

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check workspace
        run: mise run cargo-check

      - name: Test workspace
        run: mise run test

      - name: Validate tape syntax through CLI
        run: mise run validate

      - name: Check CLI version command
        run: mise run version

  package:
    name: Package and smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Ubuntu crash diagnostics
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gdb binutils

      - name: Package crates
        run: mise run package

      - name: Install CLI from path
        run: mise run install-smoke

      - name: Render smoke tape
        env:
          RUST_BACKTRACE: full
        run: |
          set -uo pipefail
          mise run smoke
          status=$?
          if [[ "$status" -eq 0 ]]; then
            exit 0
          fi
          if [[ "${{ matrix.os }}" != "ubuntu-latest" ]]; then
            exit "$status"
          fi

          echo "::group::Ubuntu CPU and binary diagnostics"
          uname -a || true
          lscpu || true
          grep -m1 '^flags' /proc/cpuinfo || true
          file target/debug/betamax || true
          ldd target/debug/betamax || true
          echo "::endgroup::"

          cargo build -p betamax
          gdb -q -batch \
            -ex 'set pagination off' \
            -ex 'set confirm off' \
            -ex 'run run examples/basic.tape' \
            -ex 'printf "\n--- program ---\n"' \
            -ex 'info program' \
            -ex 'printf "\n--- registers ---\n"' \
            -ex 'info registers' \
            -ex 'printf "\n--- disassembly around pc ---\n"' \
            -ex 'x/24i $pc-32' \
            -ex 'printf "\n--- all threads ---\n"' \
            -ex 'thread apply all bt full' \
            --args target/debug/betamax || true

          exit "$status"

  dependencies:
    name: Dependency check (${{ matrix.name }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow-failure }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dependency policy
            tools: cargo-deny
            command: mise run dependency-policy
            allow-failure: false
          - name: features
            tools: cargo-hack
            command: mise run feature-check
            allow-failure: false
          - name: minimal versions
            tools: cargo-minimal-versions,cargo-hack
            command: mise run minimal-versions
            allow-failure: false
          - name: unused dependencies
            tools: cargo-udeps
            command: mise run udeps
            allow-failure: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install nightly Rust
        run: rustup toolchain install nightly

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo maintenance tools
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: ${{ matrix.tools }}
          fallback: none

      - name: Run dependency check
        run: ${{ matrix.command }}

  required:
    name: Required
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - package
      - dependencies
      - zizmor
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          HAS_FAILED_JOB: >-
            ${{
              contains(needs.*.result, 'failure')
              || contains(needs.*.result, 'cancelled')
              || contains(needs.*.result, 'skipped')
            }}
        run: |
          echo "$NEEDS_JSON"
          test "$HAS_FAILED_JOB" = "false"

  zizmor:
    name: GitHub Actions security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
