name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  lint:
    name: Lint, docs, and validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: just fmt-check

      - name: Check clippy
        run: just clippy

      - name: Check documentation builds
        run: just doc

      - name: Run doc tests
        run: just doc-test

      - name: Lint Markdown
        run: just lint-md

      - name: Validate tapes
        run: just validate

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check workspace
        run: mise exec -- cargo check --workspace --all-targets

      - name: Test workspace
        run: mise exec -- cargo test --workspace --all-targets

      - name: Validate tape syntax through CLI
        run: mise exec -- cargo run -p betamax -- validate "examples/*.tape" docs.tape

      - name: Check CLI version command
        run: mise exec -- cargo run -p betamax -- --version

  package:
    name: Package and smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Package crates
        run: just package

      - name: Install CLI from path
        run: just install-smoke

      - name: Render smoke tape
        run: just smoke

  dependencies:
    name: Dependency check (${{ matrix.name }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow-failure }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: audit
            tools: cargo-audit
            command: just audit
            allow-failure: false
          - name: features
            tools: cargo-hack
            command: just feature-check
            allow-failure: false
          - name: minimal versions
            tools: cargo-minimal-versions,cargo-hack
            command: just minimal-versions
            allow-failure: false
          - name: unused dependencies
            tools: cargo-udeps
            command: just udeps
            allow-failure: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install nightly Rust
        run: rustup toolchain install nightly

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo maintenance tools
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: ${{ matrix.tools }}
          fallback: none

      - name: Run dependency check
        run: ${{ matrix.command }}

  required:
    name: Required
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - package
      - dependencies
      - zizmor
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          HAS_FAILED_JOB: >-
            ${{
              contains(needs.*.result, 'failure')
              || contains(needs.*.result, 'cancelled')
              || contains(needs.*.result, 'skipped')
            }}
        run: |
          echo "$NEEDS_JSON"
          test "$HAS_FAILED_JOB" = "false"

  zizmor:
    name: GitHub Actions security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
