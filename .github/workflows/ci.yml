name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint, docs, and validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Install mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: just fmt-check

      - name: Check clippy
        run: just clippy

      - name: Check documentation builds
        run: just doc

      - name: Run doc tests
        run: just doc-test

      - name: Lint Markdown
        run: just lint-md

      - name: Validate tapes
        run: just validate

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: mise exec -- cargo check --workspace --all-targets

      - name: Test workspace
        run: mise exec -- cargo test --workspace --all-targets

      - name: Validate tape syntax through CLI
        run: mise exec -- cargo run -p betamax -- validate "examples/*.tape" docs.tape

      - name: Check CLI version command
        run: mise exec -- cargo run -p betamax -- --version

  package:
    name: Package and smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Install mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Package crates
        run: just package

      - name: Install CLI from path
        run: just install-smoke

      - name: Render smoke tape
        run: just smoke

  dependencies:
    name: Dependency check (${{ matrix.name }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow-failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: audit
            tool: cargo-audit
            command: just audit
            allow-failure: false
          - name: features
            tool: cargo-hack
            command: just feature-check
            allow-failure: false
          - name: minimal versions
            tool: cargo-minimal-versions
            command: just minimal-versions
            allow-failure: false
          - name: unused dependencies
            tool: cargo-udeps
            command: just udeps
            allow-failure: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install nightly Rust
        run: rustup toolchain install nightly

      - name: Install mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Install cargo maintenance tools
        uses: taiki-e/install-action@v2
        with:
          tool: ${{ matrix.tool }}
          fallback: none

      - name: Run dependency check
        run: ${{ matrix.command }}

  required:
    name: Required
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - package
      - dependencies
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          HAS_FAILED_JOB: >-
            ${{
              contains(needs.*.result, 'failure')
              || contains(needs.*.result, 'cancelled')
              || contains(needs.*.result, 'skipped')
            }}
        run: |
          echo "$NEEDS_JSON"
          test "$HAS_FAILED_JOB" = "false"
