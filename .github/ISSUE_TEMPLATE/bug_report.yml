name: Bug report
description: Report reproducible Betamax behavior that looks incorrect.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest tape, command, or repository state that reproduces it.
      placeholder: |
        ```sh
        betamax run example.tape
        ```
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include versions and platform details.
      placeholder: |
        betamax --version
        rustc --version
        uname -a
        echo "$SHELL"
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Artifacts
      description: Attach or describe screenshots, state JSON, logs, or generated media if useful.
