name: Feature request
description: Suggest focused behavior, syntax, output, or documentation improvements.
title: "Feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a focused Betamax improvement.

        If this is a question, early idea, or a note about what you built with Betamax,
        please use [Discussions](https://github.com/joshka/betamax/discussions) instead.
        The [Show and tell](https://github.com/joshka/betamax/discussions/categories/show-and-tell)
        category is especially welcome for examples, screenshots, rendered tapes, and project links.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or unsupported today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior or API you want Betamax to provide.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workarounds or other designs did you consider?
  - type: checkboxes
    id: docs
    attributes:
      label: Documentation impact
      options:
        - label: This would need tape reference, examples, or docs site updates.
